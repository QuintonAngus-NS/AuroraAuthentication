<html>
    <head>
        <title>Aurora</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
        <link rel="stylesheet" href="./css/main.css">
        <link rel="icon" href="./Resources/StarLogo.png">  
    </head>
    <body>
        <div id="backdrop">
            <div id="backdropContainer">
                <div id="backdropHeader">Welcome Back!</div>
                <div id="backdropDivider"></div>
                <div id="backdropSubText">
                    Login to aurora to continue, and bring clarity to your library management.
                </div>
            </div>
        </div>
        <div id="userInterface">
            <div id="loginContainer" class="container">
                <img src="./Resources/Arora Logo.png" class="auroraLogo">
                <div class="title">Login</div>
                <div class="inputWrapper">
                    <div class="inputHeader">Email</div>
                    <input type="text" placeholder="" id="loginEmailInput">
                </div>
                <div class="inputWrapper">
                    <div class="inputHeader">Password</div>
                    <input type="password" placeholder="" id="loginPasswordInput">
                    <div class="errorWrapper">
                        <div class="error" id="loginError"><span class="material-symbols-outlined errorIcon">warning</span>some error</div>
                        <div class="altText">Forgot Password?</div>
                    </div>
                </div>
                <div class="btnText">< Login</div>
                <div class="dividerWrapper">
                    <div class="divider"></div>
                    <div class="dividerHeader">Continue With</div>
                    <div class="divider"></div>
                </div>
                <div class="servicesWrapper">
                    <img src="./Resources/GoogleIcon.svg" class="serviceIcon">
                    <img src="./Resources/AppleIconBlack.svg" class="serviceIcon appleIcon">
                    <img src="./Resources/MicrosoftIcon.svg" class="serviceIcon">
                </div>
                <div class="signUpLinkText">Don't have an account? Sign-Up</div>
            </div>
        </div>
    </body>
</html>
